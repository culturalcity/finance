<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱大安・財務月報總覽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root {
    --ink:#1a1814;--ink2:#3d3a34;--ink3:#7a7670;
    --paper:#f8f5f0;--paper2:#ede9e2;
    --gold:#b8860b;--gold2:#d4a017;
    --border:rgba(26,24,20,0.12);
    --green:#1a6b3c;--blue:#1a4a6b;--radius:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.7;}
  .header{background:var(--ink);color:#f8f5f0;padding:36px 32px 28px;border-bottom:3px solid var(--gold);position:relative;overflow:hidden;}
  .header::before{content:'';position:absolute;top:0;right:0;bottom:0;width:200px;background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(184,134,11,0.07) 6px,rgba(184,134,11,0.07) 7px);}
  .header h1{font-size:22px;font-weight:700;letter-spacing:0.06em;margin-bottom:4px;}
  .header p{font-size:12px;color:rgba(248,245,240,0.45);letter-spacing:0.1em;}
  .header-badge{display:inline-block;margin-top:12px;background:rgba(184,134,11,0.2);border:1px solid rgba(184,134,11,0.4);color:var(--gold2);font-size:11px;padding:3px 10px;border-radius:10px;letter-spacing:0.06em;}
  .main{max-width:680px;margin:0 auto;padding:32px 20px 60px;}
  .notice{background:rgba(184,134,11,0.07);border:1px solid rgba(184,134,11,0.22);border-radius:var(--radius);padding:12px 16px;font-size:12.5px;color:var(--ink2);margin-bottom:28px;line-height:1.8;}
  .year-label{font-size:11px;font-weight:700;letter-spacing:0.2em;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .year-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .report-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
  .report-card{display:flex;align-items:center;background:white;border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;text-decoration:none;color:var(--ink);transition:all 0.18s;position:relative;overflow:hidden;}
  .report-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background 0.18s;}
  .report-card:hover{border-color:rgba(184,134,11,0.4);background:rgba(184,134,11,0.03);transform:translateX(2px);}
  .report-card:hover::before{background:var(--gold);}
  .report-card.latest::before{background:var(--gold);}
  .report-card.latest{border-color:rgba(184,134,11,0.3);}
  .card-month{font-size:20px;font-weight:700;color:var(--ink);min-width:60px;letter-spacing:-0.01em;}
  .card-meta{flex:1;padding:0 14px;}
  .card-title{font-size:13.5px;font-weight:500;color:var(--ink2);margin-bottom:2px;}
  .card-period{font-size:11px;color:var(--ink3);}
  .card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .badge-new{background:rgba(26,107,60,0.12);color:var(--green);border:1px solid rgba(26,107,60,0.2);}
  .badge-gold{background:rgba(184,134,11,0.1);color:var(--gold);border:1px solid rgba(184,134,11,0.2);}
  .card-arrow{font-size:16px;color:var(--ink3);margin-left:8px;transition:transform 0.18s,color 0.18s;}
  .report-card:hover .card-arrow{transform:translateX(4px);color:var(--gold);}
  .footer{text-align:center;font-size:11px;color:var(--ink3);padding-top:20px;border-top:1px solid var(--border);line-height:1.9;}
  @media(max-width:480px){.header{padding:28px 20px 22px;}.header h1{font-size:18px;}.card-month{font-size:17px;min-width:48px;}.card-title{font-size:13px;}}
</style>
</head>
<body>
<div class="header">
  <h1>閱大安・財務月報</h1>
  <p>閱大安 COMMUNITY · MONTHLY FINANCIAL REPORT</p>
  <div class="header-badge">住戶公告專區</div>
</div>
<div class="main">
  <div class="notice">📋 本頁為閱大安社區每月財務報表公告。點擊各月份連結即可查閱完整報告。如有疑問請洽管委會。</div>

  <!-- ══ 2026 年 ══ -->
  <div class="year-label">2026 年度</div>
  <div class="report-list">

    <a href="2026-02.html" class="report-card latest">
      <div class="card-month">2月</div>
      <div class="card-meta">
        <div class="card-title">2026年2月財務月報</div>
        <div class="card-period">2026-02-01 ～ 2026-02-28 ・ 發布：2026/03/19</div>
      </div>
      <div class="card-badges">
        <span class="badge badge-new">最新</span>
        <span class="badge badge-gold">含遞延付款說明</span>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a href="2026-01.html" class="report-card">
      <div class="card-month">1月</div>
      <div class="card-meta">
        <div class="card-title">2026年1月財務月報</div>
        <div class="card-period">2026-01-01 ～ 2026-01-31 ・ 發布：2026/02/15</div>
      </div>
      <div class="card-badges">
        
        <span class="badge badge-gold">首期報告</span>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>
  <div class="footer">閱大安管理委員會 · 財務資料僅供本社區住戶參考<br>如發現資料有誤請聯繫管委會財務委員</div>
</div>
</body>
</html>
